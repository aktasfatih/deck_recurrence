# Throwaway development Nextcloud with this app mounted from the checkout.
# Mirrors production (nextcloud:32-apache + postgres 16). No volumes are
# persisted: `docker compose down` resets everything.
#
#   cd dev && ./setup.sh          # start + install Deck + enable the app
#   http://localhost:8890         # login: admin / admin
services:
  db:
    image: postgres:16
    container_name: deck_recurrence-dev-db
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud

  nextcloud:
    image: nextcloud:32-apache
    container_name: deck_recurrence-dev
    ports:
      - "8890:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
    volumes:
      - ..:/var/www/html/custom_apps/deck_recurrence
    depends_on:
      - db
