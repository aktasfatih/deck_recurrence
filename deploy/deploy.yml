#
# Deploys the deck_recurrence app from its git repository into a
# docker-compose based Nextcloud.
#
# The frontend is built on the Ansible controller (needs Node >= 20.19),
# then only the release files are pushed to the server — the server needs
# no JS toolchain. Safe by construction: the only path ever written inside
# the Nextcloud volume is custom_apps/deck_recurrence — no other app,
# no config and no compose files are touched.
#
# Usage: ansible-playbook -i deploy/inventory.yml deploy/deploy.yml
---
- name: Deploy Deck Recurrence to Nextcloud
  hosts: nextcloud
  vars:
    app_id: deck_recurrence
    repo_url: https://github.com/aktasfatih/deck_recurrence.git
    app_ref: main
    controller_build_dir: "{{ lookup('env', 'HOME') }}/builds/{{ app_id }}"
    controller_stage_dir: "{{ lookup('env', 'HOME') }}/builds/{{ app_id }}-dist"
    remote_stage_dir: "builds/{{ app_id }}-dist"
    nextcloud_container: your-nextcloud-container

  tasks:
    - name: Check out application source on the controller
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ controller_build_dir }}"
        version: "{{ app_ref }}"
        force: true
      delegate_to: localhost

    - name: Install frontend dependencies on the controller
      ansible.builtin.command: npm ci --no-audit --no-fund
      args:
        chdir: "{{ controller_build_dir }}"
      changed_when: true
      delegate_to: localhost

    - name: Build frontend bundle on the controller
      ansible.builtin.command: sh -c 'rm -rf js css && npm run build'
      args:
        chdir: "{{ controller_build_dir }}"
      changed_when: true
      delegate_to: localhost

    - name: Stage release files without development artifacts
      ansible.builtin.command: >
        rsync -a --delete --mkpath
        --exclude .git --exclude node_modules --exclude src
        --exclude deploy --exclude tests --exclude cypress
        {{ controller_build_dir }}/ {{ controller_stage_dir }}/{{ app_id }}/
      changed_when: true
      delegate_to: localhost

    - name: Push release files to the server
      ansible.builtin.command: >
        rsync -a --delete --mkpath
        {{ controller_stage_dir }}/{{ app_id }}/
        {{ inventory_hostname }}:{{ remote_stage_dir }}/{{ app_id }}/
      changed_when: true
      delegate_to: localhost

    - name: Remove leftover staging copy inside the container
      ansible.builtin.command: >
        docker exec {{ nextcloud_container }}
        rm -rf /tmp/{{ app_id }}.new
      changed_when: false

    - name: Copy app into the Nextcloud container
      ansible.builtin.command: >
        docker cp {{ remote_stage_dir }}/{{ app_id }}
        {{ nextcloud_container }}:/tmp/{{ app_id }}.new
      changed_when: true

    - name: Give the app files to the web server user
      ansible.builtin.command: >
        docker exec {{ nextcloud_container }}
        chown -R www-data:www-data /tmp/{{ app_id }}.new
      changed_when: true

    - name: Replace only this app's directory in custom_apps
      ansible.builtin.command: >
        docker exec {{ nextcloud_container }}
        sh -c "rm -rf /var/www/html/custom_apps/{{ app_id }}
        && mv /tmp/{{ app_id }}.new /var/www/html/custom_apps/{{ app_id }}"
      changed_when: true

    - name: Enable the app (runs its database migration)
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ app:enable {{ app_id }}
      register: enable_result
      changed_when: "'already enabled' not in enable_result.stdout"

    - name: Run pending app upgrades
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ upgrade --no-interaction
      register: upgrade_result
      changed_when: "'already latest version' not in upgrade_result.stdout"

    # A version bump can be picked up with a short delay right after the
    # files are replaced (cached appinfo), which would leave the instance
    # in "update needed" mode and block the web UI. Re-check and re-run
    # until the instance reports no pending upgrade.
    - name: Read instance status
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ status --output json
      register: status_result
      changed_when: false

    - name: Run upgrade again if one became pending
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ upgrade --no-interaction
      when: (status_result.stdout | from_json).needsDbUpgrade
      changed_when: true

    - name: Verify no upgrade is pending
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ status --output json
      register: final_status
      changed_when: false
      failed_when: (final_status.stdout | from_json).needsDbUpgrade
        or (final_status.stdout | from_json).maintenance

    - name: Read enabled app list
      ansible.builtin.command: >
        docker exec -u www-data {{ nextcloud_container }}
        php occ app:list --enabled
      register: app_list
      changed_when: false

    - name: Verify the app is enabled
      ansible.builtin.assert:
        that:
          - app_id in app_list.stdout
        fail_msg: "{{ app_id }} does not appear in the enabled app list"
        success_msg: "{{ app_id }} is enabled"
